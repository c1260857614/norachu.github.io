<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nora | Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, Helvetica Neue, PingFang SC, sans-serif;
            background: #ffffff;
            color: #000000;
            line-height: 1.55;
            padding-top: 90px;
        }

        /* 顶部固定栏 去掉底部分割线 */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 90px;
            background: #fff;
            /* 删掉了 border-bottom 分割线 */
            z-index: 200;
            display: flex;
            align-items: center;
            padding-left: 40px;
            gap: 30px;
        }

        /* 顶部圆形头像 72px */
        .top-logo {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #000;
            color: #fff;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        /* 顶部标题区域 和下方内容左对齐 */
        .top-title-wrap {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .top-title-cn {
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .top-title-en {
            font-size: 14px;
            color: #999;
        }

        /* 左侧侧边栏 */
        aside {
            position: fixed;
            top: 90px;
            left: 0;
            width: 220px;
            height: calc(100vh - 90px);
            padding: 48px 40px;
            z-index: 100;
        }

        /* 左侧导航 取消Nora文字，直接靠上 */
        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .nav-menu a {
            font-size: 14px;
            color: #000;
            text-decoration: none;
            opacity: 0.65;
            transition: opacity 0.25s ease;
        }

        .nav-menu a.active,
        .nav-menu a:hover {
            opacity: 1;
        }

        .side-footer {
            position: absolute;
            bottom: 48px;
            left: 40px;
            font-size: 12px;
            color: #999;
            line-height: 1.6;
        }

        /* 主内容区 与顶部标题左对齐 */
        .wrapper {
            max-width: 100%;
            padding: 40px 40px 4rem 40px;
            margin-left: 220px;
        }

        .work-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 48px 32px;
        }

        .work-card {
            text-decoration: none;
            color: #000;
            display: block;
        }

        .cover {
            width: 100%;
            height: 340px;
            background: #f3f3f3;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.35s ease;
        }

        .work-card:hover .cover img {
            transform: scale(1.04);
        }

        .work-title {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 0.3rem;
        }

        .work-desc {
            font-size: 13px;
            color: #666;
        }

        /* 移动端 */
        @media (max-width: 768px) {
            .top-bar {
                display: none;
            }
            body {
                padding-top: 0;
            }
            aside {
                position: relative;
                top: 0;
                width: 100%;
                height: auto;
                padding: 24px 20px;
            }
            .nav-menu {
                flex-direction: row;
                gap: 20px;
            }
            .side-footer {
                display: none;
            }
            .wrapper {
                margin-left: 0;
                padding: 2rem 16px 3rem;
            }
            .work-grid {
                grid-template-columns: 1fr;
                gap: 30px 0;
            }
            .cover {
                height: 240px;
            }
        }
    </style>
</head>
<body>

    <!-- 顶部固定栏 -->
    <div class="top-bar">
        <div class="top-logo">nora</div>
        <div class="top-title-wrap">
            <div class="top-title-cn">一些工作内容</div>
            <div class="top-title-en">Selected Works</div>
        </div>
    </div>

    <!-- 左侧侧边栏：已取消Nora文字，导航靠上 -->
    <aside>
        <div class="nav-menu">
            <a href="index.html" class="active">Work</a>
            <a href="about.html">About</a>
            <a href="#">Contact</a>
        </div>

        <div class="side-footer">
            © 2026 Nora<br>
            Interaction / UX Designer
        </div>
    </aside>

    <div class="wrapper">
        <div class="work-grid">
            <a href="portfolio1.pdf" target="_blank" class="work-card">
                <div class="cover"></div>
                <div class="work-title">Portfolio</div>
                <div class="work-desc">Interaction / UX Design</div>
            </a>
            <a href="#" class="work-card">
                <div class="cover"></div>
                <div class="work-title">Project Name</div>
                <div class="work-desc">Interaction / UX Design</div>
            </a>
            <a href="#" class="work-card">
                <div class="cover"></div>
                <div class="work-title">Project Name</div>
                <div class="work-desc">Interaction / UX Design</div>
            </a>
            <a href="#" class="work-card">
                <div class="cover"></div>
                <div class="work-title">Project Name</div>
                <div class="work-desc">Interaction / UX Design</div>
            </a>
        </div>
    </div>

</body>
</html>
