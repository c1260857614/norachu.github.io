<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nora | Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, Helvetica Neue, PingFang SC, sans-serif;
            background: #ffffff;
            color: #000000;
            line-height: 1.55;
        }

        /* 左侧侧边栏 整体加宽留白 */
        aside {
            position: fixed;
            top: 0;
            left: 0;
            width: 220px;
            height: 100vh;
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 100;
        }

        .logo {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-bottom: 60px;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .nav-menu a {
            font-size: 14px;
            color: #000;
            text-decoration: none;
            opacity: 0.65;
            transition: opacity 0.25s ease;
        }

        .nav-menu a:hover {
            opacity: 1;
        }

        /* 左侧页脚 */
        .side-footer {
            font-size: 12px;
            color: #999;
            line-height: 1.6;
        }

        /* 主内容区 右侧拉满不留白 */
        .wrapper {
            max-width: 100%;
            padding: 8rem 40px 4rem 40px;
            margin-left: 220px;
        }

        /* 作品网格铺满版面 */
        .work-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 48px 32px;
        }

        .work-card {
            text-decoration: none;
            color: #000;
            display: block;
        }

        .cover {
            width: 100%;
            height: 340px;
            background: #f3f3f3;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.35s ease;
        }

        .work-card:hover .cover img {
            transform: scale(1.04);
        }

        .work-title {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 0.3rem;
        }

        .work-desc {
            font-size: 13px;
            color: #666;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            aside {
                position: relative;
                width: 100%;
                height: auto;
                padding: 24px 20px;
            }
            .logo {
                margin-bottom: 20px;
            }
            .nav-menu {
                flex-direction: row;
                gap: 20px;
            }
            /* 移动端页脚放底部 */
            .side-footer {
                display: none;
            }
            .wrapper {
                margin-left: 0;
                padding: 2rem 16px 3rem;
            }
            .work-grid {
                grid-template-columns: 1fr;
                gap: 30px 0;
            }
            .cover {
                height: 240px;
            }
        }
    </style>
</head>
<body>
    <!-- 左侧侧边栏：上方导航 + 底部页脚 -->
    <aside>
        <div class="nav-top">
            <div class="logo">Nora</div>
            <div class="nav-menu">
                <a href="index.html">Work</a>
                <a href="about.html">About</a>
                <a href="#">Contact</a>
            </div>
        </div>

        <div class="side-footer">
            © 2026 Nora<br>
            Interaction / UX Designer
        </div>
    </aside>

    <!-- 作品区域 -->
    <div class="wrapper">
        <div class="work-grid">

            <!-- 项目1 -->
            <a href="portfolio1.pdf" target="_blank" class="work-card">
                <div class="cover">
                    <!-- <img src="cover1.jpg"> -->
                </div>
                <div class="work-title">Portfolio</div>
                <div class="work-desc">Interaction / UX Design</div>
            </a>

            <!-- 项目2 -->
            <a href="#" class="work-card">
                <div class="cover">
                    <!-- <img src="cover2.jpg"> -->
                </div>
                <div class="work-title">Project Name</div>
                <div class="work-desc">Interaction / UX Design</div>
            </a>

            <!-- 项目3 -->
            <a href="#" class="work-card">
                <div class="cover">
                    <!-- <img src="cover3.jpg"> -->
                </div>
                <div class="work-title">Project Name</div>
                <div class="work-desc">Interaction / UX Design</div>
            </a>

            <!-- 项目4 -->
            <a href="#" class="work-card">
                <div class="cover">
                    <!-- <img src="cover4.jpg"> -->
                </div>
                <div class="work-title">Project Name</div>
                <div class="work-desc">Interaction / UX Design</div>
            </a>

        </div>
    </div>
</body>
</html>
