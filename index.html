<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nora | Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, Helvetica Neue, PingFang SC, Microsoft YaHei, sans-serif;
            background: #ffffff;
            color: #000000;
            line-height: 1.55;
        }

        /* 顶部导航 1:1 同款 */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 2.2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            z-index: 100;
        }

        .logo {
            font-size: 17px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .nav-menu a {
            margin-left: 2.5rem;
            font-size: 14px;
            color: #000;
            text-decoration: none;
            opacity: 0.65;
            transition: opacity 0.25s ease;
        }

        .nav-menu a:hover {
            opacity: 1;
        }

        /* 主容器 */
        .wrapper {
            max-width: 1180px;
            margin: 0 auto;
            padding: 8rem 3rem 4rem;
        }

        /* 作品网格 同款两列 */
        .work-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 3.5rem 2.5rem;
        }

        .work-card {
            text-decoration: none;
            color: #000;
            display: block;
        }

        .cover {
            width: 100%;
            height: 300px;
            background: #f3f3f3;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.35s ease;
        }

        .work-card:hover .cover img {
            transform: scale(1.04);
        }

        .work-title {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 0.3rem;
        }

        .work-desc {
            font-size: 13px;
            color: #666;
        }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 3rem 0;
            font-size: 12px;
            color: #999;
        }

        /* 移动端自适应 单列 */
        @media (max-width: 768px) {
            nav {
                padding: 1.5rem 1.2rem;
            }
            .nav-menu a {
                margin-left: 1.2rem;
            }
            .wrapper {
                padding: 6rem 1.2rem 3rem;
            }
            .work-grid {
                grid-template-columns: 1fr;
                gap: 2.5rem 0;
            }
            .cover {
                height: 240px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航 -->
    <nav>
        <div class="logo">Nora</div>
        <div class="nav-menu">
            <a href="#">Work</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <!-- 作品区域 预留4个空位 -->
    <div class="wrapper">
        <div class="work-grid">

            <!-- 项目1 -->
            <a href="portfolio1.pdf" target="_blank" class="work-card">
                <div class="cover">
                    <!-- 以后上传封面图就换成：<img src="cover1.jpg"> -->
                </div>
                <div class="work-title">Portfolio</div>
                <div class="work-desc">Interaction / UX Design</div>
            </a>

            <!-- 项目2 -->
            <a href="#" class="work-card">
                <div class="cover">
                    <!-- <img src="cover2.jpg"> -->
                </div>
                <div class="work-title">Project Name</div>
                <div class="work-desc">Interaction / UX Design</div>
            </a>

            <!-- 项目3 -->
            <a href="#" class="work-card">
                <div class="cover">
                    <!-- <img src="cover3.jpg"> -->
                </div>
                <div class="work-title">Project Name</div>
                <div class="work-desc">Interaction / UX Design</div>
            </a>

            <!-- 项目4 -->
            <a href="#" class="work-card">
                <div class="cover">
                    <!-- <img src="cover4.jpg"> -->
                </div>
                <div class="work-title">Project Name</div>
                <div class="work-desc">Interaction / UX Design</div>
            </a>

        </div>
    </div>

    <!-- 页脚 -->
    <footer>
        © 2026 Nora · Interaction / UX Designer
    </footer>
</body>
</html>
